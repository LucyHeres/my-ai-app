<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>企业知识库</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <!-- 顶部导航 -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">📚</div>
        <span>企业知识库</span>
      </div>
      <nav class="nav-menu">
        <button id="tabRag" class="nav-item" type="button">文档管理</button>
        <button id="tabChat" class="nav-item active" type="button">智能问答</button>
      </nav>
      <div class="header-right">
        <span id="model" class="model-pill">模型：未加载</span>
        <span id="user" class="user-pill">用户：未登录</span>
        <button id="switchUser" class="icon-btn-small" type="button" title="切换用户">👤</button>
        <button id="newChat" class="icon-btn-small" type="button" title="新会话">➕</button>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="main">

      <!-- 智能问答面板 -->
      <section id="chatPanel" class="tabPanel active">
        <div class="chat-area">
          <div class="messages-container" id="messages"></div>
          <div class="input-area">
            <div class="rag-toggle-bar">
              <label class="rag-check">
                <input id="ragEnabled" type="checkbox">
                聊天中启用知识库
              </label>
              <span id="ragStatus" class="rag-status-pill">知识库：未导入</span>
            </div>
            <form id="form" class="input-wrapper">
              <textarea id="input" placeholder="输入问题，按 Enter 发送" autocomplete="off"></textarea>
              <div class="input-footer">
                <button id="send" type="submit" class="send-btn">发送 ➤</button>
              </div>
            </form>
          </div>
          </div>
      </section>

      <!-- 文档管理面板 -->
      <section id="ragPanel" class="tabPanel">
        <div class="content">
          <div class="content-header">
            <h1 class="page-title">文档管理</h1>
            <div class="header-actions">
              <div class="search-box">
                <span>🔍</span>
                <input type="text" placeholder="搜索文档..." disabled>
              </div>
              <button id="fakeUpload" class="btn btn-primary" type="button">
                <span>⬆️</span>
                <span>上传文档</span>
              </button>
            </div>
          </div>

          <!-- 文档上传区域 (当前是文本导入方式) -->
          <div class="upload-section">
            <div class="files-section">
              <div class="rag-upload">
                <div class="rag-row">
                  <button id="ragIngest" class="btn btn-primary" type="button">导入文本</button>
                  <span id="ragStatus2" class="rag-status-pill">把文本粘贴后点击导入</span>
                </div>
                <input id="ragTitle" class="rag-title" type="text" placeholder="标题（可选）" autocomplete="off">
                <textarea id="ragText" class="rag-text" placeholder="把知识库文本粘贴到这里（例如产品说明、FAQ、规则等）"></textarea>
              </div>
            </div>
          </div>

          <!-- 文档列表占位 (后续补充) -->
          <div class="files-section" style="margin-top: 24px;">
            <table class="file-table">
              <thead>
                <tr>
                  <th>文档名称</th>
                  <th>大小</th>
                  <th>上传时间</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td colspan="5" style="text-align: center; padding: 40px; color: #9ca3af;">
                    文档列表功能待后续补充
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
