<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>企业知识库</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app">
      <!-- 顶部导航 -->
      <header class="header">
        <div class="logo">
          <div class="logo-icon">📚</div>
          <span>企业知识库</span>
        </div>
        <nav class="nav-menu">
          <button id="tabRag" class="nav-item" type="button">文档管理</button>
          <button id="tabChat" class="nav-item active" type="button">智能问答</button>
        </nav>
        <div class="header-right">
          <button id="newChat" class="top-icon-btn auto" type="button" title="新会话">+ 新建对话</button>
          <button id="switchUser" class="top-icon-btn small" type="button" title="切换用户">👤</button>
        </div>
      </header>

      <!-- 主内容区 -->
      <main class="main">
        <!-- 智能问答面板 -->
        <section id="chatPanel" class="tabPanel active">
          <div class="chat-area">
            <div class="messages-container" id="messages"></div>
            <div class="input-area">
              <div class="rag-toggle-bar">
                <label class="rag-check">
                  <input id="ragEnabled" type="checkbox" />
                  聊天中启用知识库
                </label>
              </div>
              <form id="form" class="input-wrapper">
                <textarea id="input" placeholder="输入问题，按 Enter 发送" autocomplete="off"></textarea>
                <div class="input-footer">
                  <span id="model" class="model-pill">模型：未加载</span>
                  <button id="send" type="submit" class="send-btn">发送 ➤</button>
                </div>
              </form>
            </div>
          </div>
        </section>

        <!-- 文档管理面板 -->
        <section id="ragPanel" class="tabPanel">
          <div class="content">
            <div class="content-header">
              <h1 class="page-title">文档管理</h1>
              <div class="header-actions">
                <div class="search-box">
                  <span>🔍</span>
                  <input id="docSearch" type="text" placeholder="搜索文档..." />
                </div>
                <label for="fileUpload" class="btn btn-primary" style="cursor: pointer">
                  <span>⬆️</span>
                  <span>上传文档</span>
                </label>
                <input id="fileUpload" type="file" style="display: none" multiple />
              </div>
            </div>

            <!-- 文件上传状态 -->
            <div id="uploadStatus" class="upload-status" style="display: none; margin-bottom: 16px"></div>

            <!-- 文档列表 -->
            <div class="files-section">
              <table class="file-table">
                <thead>
                  <tr>
                    <th>文档名称</th>
                    <th>大小</th>
                    <th>上传时间</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="docList">
                  <tr>
                    <td colspan="4" style="text-align: center; padding: 40px; color: #9ca3af">加载中...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- 预览弹窗 -->
    <div id="previewModal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h3 id="previewTitle" class="modal-title">文档预览</h3>
          <button id="previewClose" class="modal-close" type="button">✕</button>
        </div>
        <div class="modal-body">
          <div id="previewInfo" class="modal-info"></div>
          <div id="previewContent" class="modal-content"></div>
        </div>
        <div class="modal-footer">
          <button id="previewDownload" class="btn btn-secondary" type="button">⬇️ 下载</button>
          <button id="previewCloseBtn" class="btn btn-primary" type="button">关闭</button>
        </div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
